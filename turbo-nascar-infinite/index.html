<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TURBO NASCAR INFINITE</title>
<style>
:root{--navy:#0b1c4d;--navy2:#060f2e;--red:#d62828;--gold:#ffd24a;--white:#f6f7fb;--green:#3ddc68}
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--navy2);font-family:"Arial Black","Avenir Next Condensed",system-ui,sans-serif;color:var(--white)}
#scene{position:fixed;inset:0}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10;background:radial-gradient(ellipse at 50% 30%,#13287a 0%,var(--navy2) 70%);text-align:center}
.screen.overlay{background:rgba(4,8,28,.78)}
.hidden{display:none!important}
.stars{position:absolute;inset:0;opacity:.5;pointer-events:none;background-image:radial-gradient(#fff 1px,transparent 1.6px),radial-gradient(#fff .8px,transparent 1.4px);background-size:110px 90px,70px 120px;background-position:0 0,35px 60px}
.logo{font-style:italic;font-weight:900;line-height:.92;letter-spacing:1px;transform:skew(-7deg) rotate(-2deg);filter:drop-shadow(0 10px 0 rgba(0,0,0,.45))}
.logo .l1{font-size:min(7.5vw,64px);color:var(--gold);text-shadow:3px 3px 0 var(--red),6px 6px 0 #7a1010}
.logo .l2{font-size:min(12vw,108px);color:var(--white);text-shadow:4px 4px 0 var(--red),8px 8px 0 var(--navy),12px 12px 0 rgba(0,0,0,.4)}
.logo .l3{font-size:min(6.5vw,52px);color:#9ecbff;text-shadow:3px 3px 0 var(--navy)}
.tag{font-size:14px;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.press{font-size:26px;font-style:italic;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.97)}}
.btnrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{font:inherit;font-size:20px;font-style:italic;color:var(--white);background:linear-gradient(#16307f,var(--navy));border:4px solid var(--white);border-radius:12px;padding:10px 26px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.5);text-transform:uppercase}
.btn:hover{background:linear-gradient(#d6a012,#a87508);color:#fff;transform:translateY(-2px)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.5)}
.btn.primary{background:linear-gradient(#e23d3d,#8f1717)}
.small{font-size:13px;color:#9fb0e8}
kbd{background:#fff;color:#111;border-radius:5px;padding:1px 7px;font-family:inherit;font-size:12px;box-shadow:0 2px 0 #889;margin:0 2px}
/* kart select */
.kartrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:1100px}
.kart{width:190px;background:linear-gradient(#101f56,#0a1334);border:4px solid #3350b5;border-radius:14px;padding:12px;cursor:pointer;position:relative}
.kart.sel{border-color:var(--gold);box-shadow:0 0 22px rgba(255,210,74,.45)}
.kart.locked{filter:grayscale(.85) brightness(.7)}
.kart h3{font-size:16px;font-style:italic;margin-bottom:2px;color:var(--gold)}
.kart .flav{font-size:11px;color:#aab8e8;font-weight:400;font-family:Georgia,serif;font-style:italic;min-height:26px}
.statbar{display:flex;align-items:center;gap:6px;font-size:10px;margin-top:3px}
.statbar i{flex:1;height:8px;background:#0a102b;border-radius:4px;overflow:hidden;display:block}
.statbar i b{display:block;height:100%;background:linear-gradient(90deg,#3ddc68,#ffd24a);border-radius:4px}
.price{position:absolute;top:8px;right:8px;background:var(--red);border-radius:8px;font-size:12px;padding:2px 8px}
/* garage */
.fpbig{font-size:38px;color:var(--gold);font-style:italic;text-shadow:3px 3px 0 #7a5400}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:10px;width:min(96vw,1150px);max-height:56vh;overflow:auto;padding:6px}
.up{background:linear-gradient(#101f56,#0a1334);border:3px solid #3350b5;border-radius:12px;padding:10px;text-align:left;position:relative}
.up h4{font-size:14px;color:var(--gold);font-style:italic}
.up .flav{font-size:10.5px;color:#aab8e8;font-weight:400;font-family:Georgia,serif;font-style:italic}
.up .eff{font-size:11px;color:#cfe0ff;margin:4px 0}
.pips{display:flex;gap:3px;margin:5px 0}
.pips s{width:11px;height:11px;border-radius:3px;background:#0a102b;border:1px solid #31407f;text-decoration:none}
.pips s.on{background:var(--green);border-color:#9fffc1}
.buy{width:100%;font:inherit;font-size:13px;background:#1c8a3c;color:#fff;border:2px solid #9fffc1;border-radius:8px;padding:5px;cursor:pointer;font-style:italic}
.buy:disabled{background:#333c5c;border-color:#556;color:#8b96bd;cursor:default}
.up.maxed .buy{background:#7a5f00;border-color:var(--gold);color:var(--gold)}
/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:5}
.roundbadge{position:absolute;top:14px;left:16px;background:var(--red);border:4px solid #fff;border-radius:14px;padding:6px 16px;font-size:26px;font-style:italic;box-shadow:0 5px 0 rgba(0,0,0,.4)}
.roundbadge small{display:block;font-size:10px;letter-spacing:2px}
#fpHud{position:absolute;top:14px;right:16px;background:rgba(8,14,40,.8);border:3px solid var(--gold);border-radius:12px;padding:6px 14px;font-size:20px;color:var(--gold);font-style:italic}
#cond{position:absolute;top:86px;left:18px;font-size:13px;font-style:italic;color:#9ecbff;text-shadow:2px 2px 0 #000}
#speedo{position:absolute;right:18px;bottom:16px;width:170px;text-align:right}
#mph{font-size:52px;font-style:italic;text-shadow:3px 3px 0 #000;line-height:.9}
#mph.danger{color:#ff5d5d}
#gear{font-size:14px;color:var(--gold)}
#armorwrap{position:absolute;left:18px;bottom:18px;width:240px}
#armorwrap label{font-size:11px;letter-spacing:2px}
#armor{height:18px;border:3px solid #fff;border-radius:9px;background:#1a0f0f;overflow:hidden}
#armor b{display:block;height:100%;background:linear-gradient(90deg,#ff4040,#ffd24a 40%,#3ddc68);width:100%;transition:width .15s}
#abil{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;display:flex;gap:8px}
.slot{width:58px;height:58px;border:3px solid #fff;border-radius:12px;background:rgba(8,14,40,.85);position:relative;display:flex;align-items:center;justify-content:center;font-size:22px}
.slot .key{position:absolute;top:-9px;left:-7px;background:#fff;color:#111;font-size:11px;border-radius:5px;padding:0 5px}
.slot .cd{position:absolute;inset:0;border-radius:9px;background:conic-gradient(rgba(0,0,0,.78) calc(var(--cd)*360deg),transparent 0)}
.slot.locked{opacity:.35}
.slot.locked:after{content:"🔒";position:absolute;font-size:13px;bottom:-2px;right:0}
#packwrap{position:absolute;left:50%;transform:translateX(-50%);bottom:86px;width:300px;text-align:center}
#packwrap label{font-size:10px;letter-spacing:3px;color:#ffb3b3}
#packbar{height:10px;border:2px solid #fff;border-radius:6px;background:#101736;overflow:hidden}
#packbar b{display:block;height:100%;background:linear-gradient(90deg,#3ddc68,#ffd24a,#ff4040);width:0%}
#packwrap.close label{animation:pulse .5s infinite;color:#ff5d5d}
#banner{position:fixed;top:24%;left:0;right:0;text-align:center;font-size:min(7vw,58px);font-style:italic;color:var(--gold);text-shadow:4px 4px 0 var(--red),8px 8px 0 rgba(0,0,0,.5);z-index:8;pointer-events:none;opacity:0}
#banner.show{animation:slam .45s ease-out forwards,fadeout .6s 1.7s forwards}
@keyframes slam{0%{opacity:0;transform:scale(3)}70%{transform:scale(.94)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeout{to{opacity:0}}
#count{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:150px;font-style:italic;color:var(--gold);text-shadow:6px 6px 0 var(--red),12px 12px 0 rgba(0,0,0,.5);z-index:9;pointer-events:none}
#pops{position:fixed;inset:0;pointer-events:none;z-index:7}
.pop{position:absolute;font-size:20px;font-style:italic;color:var(--gold);text-shadow:2px 2px 0 #000;animation:rise 1.1s forwards}
.pop.bad{color:#ff6868}
@keyframes rise{to{transform:translateY(-70px);opacity:0}}
#vig{position:fixed;inset:0;pointer-events:none;z-index:6;box-shadow:inset 0 0 0 rgba(0,0,0,0);transition:box-shadow .2s}
#deathTitle{font-size:min(13vw,110px);font-style:italic;color:var(--red);text-shadow:5px 5px 0 #fff,10px 10px 0 rgba(0,0,0,.5);transform:rotate(-3deg)}
.tally{font-size:18px;width:340px;text-align:left}
.tally div{display:flex;justify-content:space-between;border-bottom:2px dashed #31407f;padding:3px 0}
.tally .total{font-size:26px;color:var(--gold);border-bottom:none;margin-top:6px}
#wreckedBy{font-size:16px;color:#9ecbff;font-style:italic}
#mute{position:fixed;bottom:8px;right:10px;font-size:11px;color:#7287c9;z-index:11}
h2.sub{font-size:30px;font-style:italic;color:var(--gold);text-shadow:3px 3px 0 var(--red)}
</style>
</head>
<body>
<div id="scene"></div>

<div id="hud" class="hidden">
  <div class="roundbadge"><small>ROUND</small><span id="roundN">1</span></div>
  <div id="fpHud">🦅 <span id="fpRun">0</span> FP</div>
  <div id="cond"></div>
  <div id="speedo"><div id="mph">0</div><div id="gear">GEAR 1 · MPH</div></div>
  <div id="armorwrap"><label>ARMOR</label><div id="armor"><b id="armorFill"></b></div></div>
  <div id="packwrap"><label id="packLabel">REAR VIEW</label><div id="packbar"><b id="packFill"></b></div></div>
  <div id="abil"></div>
</div>
<div id="banner"></div>
<div id="count" class="hidden"></div>
<div id="pops"></div>
<div id="vig"></div>

<div id="title" class="screen">
  <div class="stars"></div>
  <div class="logo"><div class="l1">TURBO</div><div class="l2">NASCAR</div><div class="l3">★ INFINITE ★</div></div>

</div>

<div id="kartSel" class="screen hidden">
  <div class="stars"></div>

  <div class="fpbig">🦅 <span id="fpKart">0</span> FP</div>

  <div class="btnrow"><button class="btn primary" id="bRace1">RACE (ENTER)</button><button class="btn" id="bBack1">Back (ESC)</button></div>
</div>

<div id="garage" class="screen hidden">
  <div class="stars"></div>
  <h2 class="sub">THE GARAGE</h2>
  <div class="fpbig">🦅 <span id="fpGarage">0</span> FP</div>
  <div class="grid" id="upGrid"></div>
  <div class="btnrow"><button class="btn primary" id="bRace2">RACE (ENTER)</button><button class="btn" id="bKart2">Karts</button><button class="btn" id="bBack2">Title (ESC)</button></div>
</div>

<div id="death" class="screen overlay hidden">
  <div id="deathTitle">WRECKED!</div>
  <div id="wreckedBy"></div>
  <div class="tally" id="tally"></div>
  <div class="btnrow"><button class="btn primary" id="bGarage2">Garage (G)</button><button class="btn" id="bRetry">Retry (R)</button><button class="btn" id="bTitle">Title (T)</button></div>
</div>

<div id="pause" class="screen overlay hidden"><h2 class="sub">FREEDOM IS PAUSED</h2><div class="press">PRESS <kbd>ESC</kbd> TO RESUME</div></div>
<div id="mute"></div>


<script id="sim-core">
"use strict";
// ============ TURBO NASCAR INFINITE — SIM CORE ============
// Pure simulation. No DOM, no rendering, no audio. Extracted verbatim by tests.
const SimCore = (() => {
  const TUNING = {
    topSpeed: 62, accel: 26, brake: 55, drag: 6.5, reverseMax: -12, reverseAccel: 9,
    steerRate: 2.4, align: 3.0, latDamp: 2.0, slideFactor: 1.35, bankF: 0.45,
    grip: 15, hpBase: 100, wallMargin: 6.9, scrapeDps: 9, slamThresh: 6, slamScale: 1.9,
    packBase: 34, packGrowth: 1.065, packGap0: 260, packLeash: 400, packDps: 32, packContact: 6,
    trafBase: 3, trafPerRound: 1.4, trafCap: 26, trafVMin: 26, trafVMax: 41, trafHitSlow: 0.45,
    fpDist: 0.03, fpRound: 15, fpRoundExp: 1.5, fpKill: 6, fpDrift: 0.5, fpPity: 25,
  };

  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const clamp = (x, lo, hi) => (x < lo ? lo : x > hi ? hi : x);

  // --- TRACK: rounded-rect oval via lookup table (straight 220, radius 80) ---
  const TRACK = (() => {
    const ST = 220, R = 80, HALF = ST / 2;
    const segLen = [ST, Math.PI * R, ST, Math.PI * R];
    const length = segLen.reduce((a, b) => a + b, 0);
    const width = 16;
    function raw(s) {
      let u = ((s % length) + length) % length;
      if (u < segLen[0]) return { x: -HALF + u, z: -R, ang: 0, curv: 0 };
      u -= segLen[0];
      if (u < segLen[1]) { const a = u / R; return { x: HALF + Math.sin(a) * R, z: -Math.cos(a) * R, ang: a, curv: 1 / R }; }
      u -= segLen[1];
      if (u < segLen[2]) return { x: HALF - u, z: R, ang: Math.PI, curv: 0 };
      u -= segLen[2];
      const a = u / R;
      return { x: -HALF - Math.sin(a) * R, z: Math.cos(a) * R, ang: Math.PI + a, curv: 1 / R };
    }
    function at(s) {
      const p = raw(s);
      return { x: p.x, z: p.z, tx: Math.cos(p.ang), tz: Math.sin(p.ang), curv: p.curv };
    }
    return { length, width, at };
  })();
  // NOTE on frame: tangent (tx,tz); left-normal = (tz, -tx) in XZ with y-up.
  function worldOf(s, d) {
    const t = TRACK.at(s);
    return { x: t.x + t.tz * d, z: t.z - t.tx * d, tx: t.tx, tz: t.tz, curv: t.curv };
  }

  // --- CONTENT TABLES ---
  const KARTS = [
    { id: "patriot", name: "THE PATRIOT", cost: 0, spd: 1, acc: 1, grp: 1, arm: 1, color: "#2452d8", num: "76", flavor: "A car. American." },
    { id: "lightning", name: "LIBERTY LIGHTNING", cost: 600, spd: 1.12, acc: 1.1, grp: 0.96, arm: 0.75, color: "#f5c518", num: "1", flavor: "Fast. Fragile. Free." },
    { id: "hauler", name: "FREEDOM HAULER", cost: 900, spd: 0.92, acc: 0.85, grp: 0.95, arm: 1.65, color: "#23272e", num: "18", flavor: "It has a cow bar." },
    { id: "moonshine", name: "MOONSHINE RUNNER", cost: 1500, spd: 1.05, acc: 1.06, grp: 1.12, arm: 0.85, color: "#a3551b", num: "33", flavor: "Outruns the law. Barely turns." },
    { id: "eagleone", name: "BALD EAGLE ONE", cost: 5000, spd: 1.15, acc: 1.15, grp: 1.1, arm: 1.1, color: "#e8e8ec", num: "★", flavor: "The final bird." },
  ];
  const UPGRADES = [
    { id: "engine", name: "BIGGER ENGINE", icon: "🐎", base: 25, growth: 1.55, max: 20, eff: "+4% top speed", flavor: "More horses. American horses." },
    { id: "tires", name: "FREEDOM TIRES", icon: "🛞", base: 25, growth: 1.55, max: 20, eff: "+8% grip", flavor: "They grip the land of the free." },
    { id: "armor", name: "STEEL PLATING", icon: "🛡️", base: 30, growth: 1.55, max: 20, eff: "+15 armor", flavor: "Genuine Detroit steel." },
    { id: "accel", name: "TURBOCHARGER", icon: "🌪️", base: 40, growth: 1.55, max: 15, eff: "+6% acceleration", flavor: "Eagle-fed induction." },
    { id: "pit", name: "PIT CREW", icon: "🔧", base: 90, growth: 1.6, max: 10, eff: "+2 armor each lap", flavor: "The boys are QUICK." },
    { id: "luck", name: "LUCKY FLAG", icon: "🇺🇸", base: 100, growth: 1.7, max: 10, eff: "+15% Freedom Points", flavor: "Stars AND stripes." },
    { id: "qual", name: "QUALIFYING", icon: "⏱️", base: 400, growth: 3, max: 5, eff: "start +1 round later", flavor: "Skip the warm-up lap, hotshot." },
    { id: "wrocket", name: "ROCKETS [Q]", icon: "🚀", base: 60, growth: 1.7, max: 5, eff: "fire freedom forward", flavor: "The red glare kind." },
    { id: "wturbo", name: "NITRO USA [T]", icon: "⚡", base: 120, growth: 1.6, max: 5, eff: "temporary illegal speed", flavor: "Corn-based. Probably." },
    { id: "wgun", name: "FREEDOM GUNS [W]", icon: "🔫", base: 150, growth: 1.7, max: 5, eff: "constitutional dakka", flavor: "Well regulated. Fully automatic." },
    { id: "wmine", name: "LIBERTY MINES [E]", icon: "💣", base: 220, growth: 1.7, max: 5, eff: "stalls THE PACK behind you", flavor: "Don't tread on these." },
    { id: "weagle", name: "EAGLE STRIKE [R]", icon: "🦅", base: 500, growth: 1.8, max: 5, eff: "air support, majestic", flavor: "SCREEEEEEE." },
  ];
  const WEAPON_KEYS = { wrocket: "q", wgun: "w", wmine: "e", weagle: "r", wturbo: "t" };
  const CONDITIONS = [
    { round: 2, id: "traffic", name: "RUSH HOUR" },
    { round: 3, id: "oil", name: "SLICK CITY" },
    { round: 4, id: "traffic2", name: "MORE CARS, MORE PROBLEMS" },
    { round: 5, id: "night", name: "NIGHT SHIFT" },
    { round: 6, id: "anthem", name: "MAXIMUM GLORY" },
    { round: 7, id: "rain", name: "GOD'S TEARS" },
    { round: 8, id: "rage", name: "ROAD RAGE" },
    { round: 9, id: "wind", name: "TORNADO WATCH" },
    { round: 10, id: "meteor", name: "SPACE DEBRIS" },
    { round: 11, id: "oil2", name: "DOUBLE SLICK" },
    { round: 12, id: "unleashed", name: "AMERICA UNLEASHED" },
  ];
  const UNHINGED = [
    "THE ASPHALT IS ANGRY", "MORE EAGLES THAN PHYSICS ALLOWS", "NASCAR PRIME",
    "EVERYTHING IS ON FIRE", "FREEDOM OVERDRIVE", "THE WALLS ARE HUNGRY",
    "UNSANCTIONED VELOCITY", "MANIFEST DESTINY LAP", "BEYOND THE CHECKERED VEIL",
  ];

  function packSpeed(round) {
    return TUNING.packBase * Math.pow(TUNING.packGrowth, Math.max(0, round - 1));
  }

  // --- META / ECONOMY ---
  const SAVE_V = 1;
  function makeMeta() {
    return { v: SAVE_V, fp: 0, upgrades: {}, karts: ["patriot"], kart: "patriot", bestRound: 0, deaths: 0, muted: false };
  }
  function serializeMeta(m) { return JSON.stringify(m); }
  function parseMeta(str) {
    if (!str) return makeMeta();
    try {
      const m = JSON.parse(str);
      if (!m || m.v !== SAVE_V || typeof m.fp !== "number" || !m.upgrades || !Array.isArray(m.karts)) return makeMeta();
      return m;
    } catch (_) { return makeMeta(); }
  }
  function upgradeOf(id) { return UPGRADES.find((u) => u.id === id); }
  function costOf(id, level) {
    const u = upgradeOf(id);
    return Math.round(u.base * Math.pow(u.growth, level));
  }
  function levelOf(m, id) { return m.upgrades[id] || 0; }
  function buy(m, id) {
    const u = upgradeOf(id);
    const lvl = levelOf(m, id);
    if (!u || lvl >= u.max) return false;
    const cost = costOf(id, lvl);
    if (m.fp < cost) return false;
    m.fp -= cost;
    m.upgrades[id] = lvl + 1;
    return true;
  }
  function buyKart(m, id) {
    const k = KARTS.find((x) => x.id === id);
    if (!k || m.karts.includes(id) || m.fp < k.cost) return false;
    m.fp -= k.cost;
    m.karts.push(id);
    m.kart = id;
    return true;
  }
  function derived(m) {
    const k = KARTS.find((x) => x.id === m.kart) || KARTS[0];
    const L = (id) => levelOf(m, id);
    return {
      topSpeed: TUNING.topSpeed * (1 + 0.04 * L("engine")) * k.spd,
      accel: TUNING.accel * (1 + 0.06 * L("accel")) * k.acc,
      grip: TUNING.grip * (1 + 0.08 * L("tires")) * k.grp,
      maxHp: (TUNING.hpBase + 15 * L("armor")) * k.arm,
      regen: 2 * L("pit"),
      fpMul: 1 + 0.15 * L("luck"),
      startRound: 1 + L("qual"),
      tiers: { q: L("wrocket"), w: L("wgun"), e: L("wmine"), r: L("weagle"), t: L("wturbo") },
    };
  }
  function fpForRun(stats, m) {
    const d = derived(m);

    makeRun, step, BOTS, makeBotMem, botInput, simulateRun, roundName, trafficQuota, wrapDelta, mulberry32,
